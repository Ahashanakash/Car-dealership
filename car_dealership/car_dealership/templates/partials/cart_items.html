{% for id,item in cart.items %}

<div class="card mb-3 p-3">

<div class="d-flex justify-content-between align-items-center">

<div>
<h5>{{ item.brand }} {{ item.model }}</h5>
<p>${{ item.price }}</p>
</div>

<div>

{% if item.quantity > 1 %}

<button
hx-get="{% url 'cart_qty' id 'dec' %}"
hx-target="#cart-container"
hx-swap="innerHTML"
class="btn btn-sm btn-secondary">-</button>

{% else %}

<button
hx-get="{% url 'remove_item' id %}"
hx-target="#cart-container"
hx-swap="innerHTML"
class="btn btn-sm btn-danger">Delete</button>

{% endif %}

<span class="mx-2">{{ item.quantity }}</span>

<button
hx-get="{% url 'cart_qty' id 'inc' %}"
hx-target="#cart-container"
hx-swap="innerHTML"
class="btn btn-sm btn-secondary">+</button>

</div>

</div>

</div>

{% endfor %}
