<div class="row">

    <div class="col-md-8">

        {% for id,item in cart.items %}

        <div class="card mb-3 p-3">

            <div class="d-flex justify-content-between align-items-center">

                <div>
                    <h5>{{ item.brand }} {{ item.model }}</h5>
                    <p>${{ item.price }}</p>
                </div>

                <div>

                    {% if item.quantity > 1 %}

                    <button hx-get="{% url 'cart_qty' id 'dec' %}" hx-target="#cart-container" hx-swap="innerHTML"
                        class="btn btn-sm btn-secondary">-</button>

                    {% else %}

                    <button hx-get="{% url 'remove_item' id %}" hx-target="#cart-container" hx-swap="innerHTML"
                        class="btn btn-sm btn-danger">Delete</button>

                    {% endif %}

                    <span class="mx-2">{{ item.quantity }}</span>

                    <button hx-get="{% url 'cart_qty' id 'inc' %}" hx-target="#cart-container" hx-swap="innerHTML"
                        class="btn btn-sm btn-secondary">+</button>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="alert alert-info">
            Cart is empty
        </div>

        {% endfor %}

    </div>

    <div class="col-md-4">

        <div class="card p-3 shadow">

            <h4>Total</h4>

            <h3>${{ total }}</h3>

            <button class="btn btn-success w-100">
                Checkout
            </button>

        </div>

    </div>

</div>
<!-- UPDATE NAVBAR CART BADGE -->
<span id="cart-badge" hx-swap-oob="true"
    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
    {{ cart_count }}
</span>
